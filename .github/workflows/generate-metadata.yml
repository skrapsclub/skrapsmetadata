name: Generate NFT Metadata Base

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-metadata:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Metadata Generator Script
      run: python process_metadata.py

    - name: Commit and Push Generated Metadata
      run: |
        git config --global user.name "skrapsclub"
        git config --global user.email "skrapsclub@users.noreply.github.com"
        git add metadata/
        git diff-index --quiet HEAD || git commit -m "Generate and deploy sequential NFT metadata files"
        git push origin HEAD:${{ github.ref }}
